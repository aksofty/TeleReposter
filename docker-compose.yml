version: '3.1'

services:
  # Основной сервис (репостер)
  telereposter:
    build: .
    container_name: telereposter_main
    volumes:
      - './volumes/data:/app/data'
      - './volumes/logs:/app/logs'
    restart: always

  # Сервис админки
  admin:
    build: .
    container_name: telereposter_admin
    command: python admin.py
    volumes:
      - './volumes/data:/app/data'
      - './volumes/logs:/app/logs'
    restart: always
    depends_on:
      - telereposter
